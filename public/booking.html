<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Booking - Cafe Informatika</title>
  <link rel="stylesheet" href="/public/assets/css/booking.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="logo-container">
      <img src="/public/assets/img/KREAWORDS BULET.png" class="logo" alt="Logo Cafe Informatika">
    </div>
    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="menu.html">Menu</a>
      <a href="booking.html" class="active">Booking</a>
      <a href="admin.html">Login</a>
    </nav>
    <button id="menuBtn" aria-label="Buka menu" class="menu-btn">
    <svg id="menuIcon" width="26" height="26" viewBox="0 0 24 24" fill="none">
      <path d="M4 6h16M4 12h16M4 18h16" stroke="white" stroke-width="2" stroke-linecap="round"/>
    </svg>
  </button>

  <!-- NAV MOBILE -->
  <div id="mobileNav" class="mobile-nav">
    <a href="index.html">Home</a>
    <a href="menu.html">Menu</a>
    <a href="booking.html">Booking</a>
    <a href="admin.html">Login</a>
  </div>
  </header>

  <!-- Main Booking Section -->
  <main class="booking-page container">
    <h2>Booking Meja</h2>

    <!-- Form Booking -->
    <form id="bookingForm" class="booking-form">
      <div class="form-group">
        <label>Nama:</label>
        <input id="bk_name" type="text" placeholder="Masukkan nama anda" required>
      </div>

      <div class="form-group">
        <label>Nomor Telepon:</label>
        <input id="bk_phone" type="tel" placeholder="08xxxxxxxxxx" required>
      </div>

      <div class="form-group">
        <label>Tanggal & Waktu:</label>
        <input id="bk_datetime" type="datetime-local" required>
      </div>

      <div class="form-group">
        <label>Jumlah Orang:</label>
        <input id="bk_people" type="number" min="1" value="" required>
      </div>

      <div class="form-group">
        <label>Catatan Tambahan:</label>
        <textarea id="bk_note" rows="3" placeholder="Contoh: meja dekat jendela"></textarea>
      </div>

      <button type="submit" class="btn">Booking Sekarang</button>
    </form>

    <!-- Booking Result -->
    <section class="booking-result" id="bookingResult">
      <h3>Daftar Booking</h3>
      <table id="bookingTable">
        <thead>
          <tr>
            <th>Nama</th>
            <th>Telepon</th>
            <th>Tanggal & Waktu</th>
            <th>Orang</th>
            <th>Catatan</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
      <button id="clearBookings" class="btn-clear">Hapus Semua Booking</button>
    </section>

    <!-- Lokasi Cafe -->
    <section class="lokasi-section">
      <h3>Lokasi Cafe KreaWords</h3>
      <div class="map-container">
        <iframe 
          src="https://maps.app.goo.gl/SgaYhtgshfxWE227A" 
          allowfullscreen="" loading="lazy">Google Maps</iframe>
      </div>
      <div class="info-kontak">
        <p><strong>Alamat:</strong> Jl. Teknologi No. 45, Bekasi</p>
        <p><strong>Nomor HP:</strong> 0812-3456-7890</p>
        <p><strong>Jam Buka:</strong> 08.00 - 22.00 WIB</p>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <p>© 2025 Cafe Informatika</p>
  </footer>

  <!-- Toast Notification -->
  <div id="toast" class="toast"></div>

  <!-- Script -->
  <script src="/public/assets/js/booking.js"></script>
</body>
</html>
