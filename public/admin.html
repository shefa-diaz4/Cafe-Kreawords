<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin - Cafe Informatika</title>
  <link rel="stylesheet" href="assets/css/admin.css">
</head>
<body>
  <header class="header">
    <img src="assets/img/logo.png" class="logo" alt="Logo Cafe Informatika">
    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="menu.html">Menu</a>
      <a href="order.html">Order</a>
      <a href="booking.html">Booking</a>
      <a href="admin.html" class="active">Admin</a>
    </nav>
  </header>

  <main class="admin-page">
    <h2>Admin Dashboard</h2>
    <section class="login-box">
      <h3>Login Admin</h3>
      <input id="adminUser" placeholder="Username">
      <input id="adminPass" placeholder="Password" type="password">
      <button id="adminLogin" class="btn">Login</button>
      <div id="loginMsg"></div>
    </section>

    <section id="adminPanel" class="admin-panel">
      <h3>Orders</h3>
      <ul id="adminOrders"></ul>

      <h3>Bookings</h3>
      <ul id="adminBookings"></ul>
    </section>
  </main>

  <footer class="footer">
    <p>© 2025 Cafe Informatika</p>
  </footer>

  <script src="assets/js/admin.js"></script>
</body>
</html>
